<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario — Sistema de Control</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <nav class="navegacion">
    <a href="/" class="navegacion__enlace">Inicio</a>
    <a href="/materiales.html" class="navegacion__enlace">Materiales</a>
    <a href="/productos.html" class="navegacion__enlace">Productos</a>
    <a href="/inventario.html" class="navegacion__enlace navegacion__enlace--activo">Inventario</a>
    <a href="/compras.html" class="navegacion__enlace">Compras</a>
    <a href="/ventas.html" class="navegacion__enlace">Ventas</a>
    <a href="/finanzas.html" class="navegacion__enlace">Finanzas</a>
    <a href="/facturacion.html" class="navegacion__enlace">Facturación</a>
  </nav>

  <main class="pagina">
    <header class="pagina__encabezado">
      <h1>Inventario en tiempo real</h1>
      <div class="tabla__acciones">
        <span class="texto-secundario" id="indicadorActualizacion"></span>
        <button type="button" class="boton" onclick="refrescarInventario()">Actualizar ahora</button>
      </div>
    </header>

    <!-- 1. Vista por material (semáforo) -->
    <section class="tarjeta seccion">
      <h2>Por material</h2>
      <table class="tabla">
        <thead>
          <tr>
            <th>Estado</th>
            <th>Material</th>
            <th>Stock actual</th>
            <th>Punto de reorden</th>
            <th>Consumo diario prom.</th>
            <th>Proveedor</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cuerpoInventarioMateriales">
          <tr><td colspan="7" class="tabla__vacio">Cargando inventario…</td></tr>
        </tbody>
      </table>
    </section>

    <!-- 2. Vista por producto (capacidad de fabricación) -->
    <section class="seccion">
      <h2>¿Cuánto puedes fabricar ahora?</h2>
      <div class="tarjetas-productos" id="listaCapacidad">
        <p class="tabla__vacio">Cargando capacidad…</p>
      </div>
    </section>

    <!-- 3. Ajuste manual de inventario -->
    <div class="modal" id="modalAjuste" hidden>
      <div class="modal__contenido tarjeta">
        <h2 id="tituloAjuste">Ajustar inventario</h2>
        <input type="hidden" id="campoAjusteMaterialId">
        <p class="texto-secundario" id="textoStockActual"></p>

        <label class="campo">
          <span class="campo__etiqueta">Cantidad real contada *</span>
          <input type="number" id="campoCantidadNueva" min="0" step="1">
        </label>
        <label class="campo">
          <span class="campo__etiqueta">Motivo del ajuste * (queda registrado)</span>
          <input type="text" id="campoMotivo" placeholder="Ej: conteo físico mensual, material dañado…">
        </label>

        <div class="modal__acciones">
          <button type="button" class="boton" onclick="cerrarAjuste()">Cancelar</button>
          <button type="button" class="boton boton--primario" onclick="confirmarAjuste()">Registrar ajuste</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/inventario.js"></script>
</body>
</html>
