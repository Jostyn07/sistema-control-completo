<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Sistema de Control</title>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <main class="pagina-login">
    <div class="tarjeta tarjeta-login">
      <h1 id="tituloFormulario">Iniciar sesión</h1>

      <div id="camposRegistro" hidden>
        <label class="campo">
          <span class="campo__etiqueta">Nombre</span>
          <input type="text" id="campoNombre" placeholder="Tu nombre">
        </label>
      </div>

      <label class="campo">
        <span class="campo__etiqueta">Correo</span>
        <input type="email" id="campoCorreo" placeholder="tucorreo@ejemplo.com">
      </label>
      <label class="campo">
        <span class="campo__etiqueta">Contraseña</span>
        <input type="password" id="campoContrasena" placeholder="Mínimo 6 caracteres">
      </label>

      <button type="button" class="boton boton--primario boton--ancho" id="botonPrincipal" onclick="enviarFormulario()">
        Entrar
      </button>

      <div class="separador-login"><span>o</span></div>

      <button type="button" class="boton boton--google boton--ancho" onclick="iniciarSesionConGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.09-1.81 2.73v2.27h2.93c1.71-1.58 2.7-3.9 2.7-6.64z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.93-2.27c-.81.54-1.85.87-3.03.87-2.33 0-4.3-1.58-5.01-3.7H.96v2.34C2.44 15.98 5.48 18 9 18z"/>
          <path fill="#FBBC05" d="M3.99 10.72A5.4 5.4 0 013.7 9c0-.6.1-1.18.29-1.72V4.94H.96A9 9 0 000 9c0 1.45.35 2.83.96 4.06l3.03-2.34z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.6-2.6C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.94l3.03 2.34C4.7 5.16 6.67 3.58 9 3.58z"/>
        </svg>
        Continuar con Google
      </button>

      <p class="texto-secundario" style="text-align:center; margin-top:14px">
        <span id="textoAlternar">¿No tienes cuenta?</span>
        <a href="#" id="enlaceAlternar" onclick="alternarModo(event)">Crear una</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
